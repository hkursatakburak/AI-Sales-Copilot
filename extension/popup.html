<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>AI Sales Copilot</title>
  </head>
  <body>
    <header class="header">
      <h1>AI Sales Copilot</h1>
      <p id="current-url" class="current-url">Sekme okunuyor…</p>
    </header>

    <main>
      <button id="analyze-btn" class="primary-btn">Bu şirketi analiz et</button>

      <!-- Yükleniyor durumu -->
      <div id="loading" class="loading hidden">
        <span class="spinner"></span> Analiz ediliyor…
      </div>

      <!-- Hata durumu -->
      <div id="error" class="error hidden"></div>

      <!-- Sonuç paneli -->
      <section id="result" class="result hidden">
        <div id="stub-banner" class="stub-banner hidden">
          ⚠️ İskelet (Sprint 1) verisi — gerçek analiz değil.
        </div>

        <div class="card">
          <h2>Şirket</h2>
          <p id="company-name"></p>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Çekilen İçerik</h2>
            <span id="scrape-badge" class="renderer-badge"></span>
          </div>
          <p id="scrape-meta" class="scrape-meta"></p>
          <p id="content-preview" class="preview"></p>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Lead Skoru</h2>
            <span id="lead-score" class="score-badge"></span>
          </div>
          <ul id="score-reasons" class="reasons"></ul>
        </div>

        <div class="card">
          <h2>Özet</h2>
          <p id="summary"></p>
        </div>

        <div class="card">
          <h2>Acı Noktaları</h2>
          <ul id="pain-points"></ul>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Soğuk E-posta</h2>
            <button class="copy-btn" data-copy-target="cold-email">Kopyala</button>
          </div>
          <pre id="cold-email" class="text-block"></pre>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Toplantı Sunumu</h2>
            <button class="copy-btn" data-copy-target="pitch">Kopyala</button>
          </div>
          <pre id="pitch" class="text-block"></pre>
        </div>
      </section>
    </main>

    <!-- Modül değil: basitlik için global script sırası. config önce yüklenmeli. -->
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
